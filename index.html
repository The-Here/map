<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Here — Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

<style>
  body { margin:0; padding:0; }
  #map { position:absolute; inset:0; }

  #timeline {
    position:absolute;
    bottom:10px; left:0; right:0;
    height:26px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
  }
  #slider { width:90%; }
  #year { position:absolute; bottom:40px; background:#37879d; color:#fff;
          padding:4px 10px; border-radius:12px; font-size:13px; }
</style>
</head>

<body>
<div id="map"></div>

<script>
/* ================= MAP ================= */

mapboxgl.accessToken =
'pk.eyJ1Ijoibm9ydGhlZGRhIiwiYSI6ImNtYmVjczJ4cTFndnEycW42cnFwbjBjbzcifQ.XYvDSeoj0uD6K8WpK5v0mQ';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [0,20],
  zoom: 1
});

const polygonLayers = [];

/* ================= TIMELINE ================= */

function sliderToYear(v) {
  return Math.round(-3100 + (v / 1000) * 5100);
}

function applyTimeline(year) {
  const filter = [
    'all',
    ['<=', ['get','start_year'], year],
    ['>=', ['get','end_year'], year]
  ];

  polygonLayers.forEach(id => {
    if (map.getLayer(id)) map.setFilter(id, filter);
    const o = id.replace('-fill','-outline');
    if (map.getLayer(o)) map.setFilter(o, filter);
  });
}

function initTimeline() {
  document.body.insertAdjacentHTML('beforeend', `
    <div id="timeline">
      <input id="slider" type="range" min="0" max="1000" value="850">
      <div id="year"></div>
    </div>
  `);

  const slider = document.getElementById('slider');
  const label = document.getElementById('year');

  function update() {
    const y = sliderToYear(+slider.value);
    label.textContent = y >= 0 ? y : Math.abs(y) + ' BCE';
    applyTimeline(y);
  }

  slider.addEventListener('input', update);
  update();
}

/* ================= LOAD DATA ================= */

map.on('load', async () => {

  const manifest = await fetch('manifest.json').then(r => r.json());

  for (const ds of manifest.datasets) {

    const geojson = await fetch(ds.file).then(r => r.json());

    geojson.features.forEach(f => {
      f.properties = f.properties || {};
      f.properties.start_year = f.properties.start_date
        ? parseInt(f.properties.start_date)
        : -9999;
      f.properties.end_year = f.properties.end_date
        ? parseInt(f.properties.end_date)
        : 9999;
    });

    map.addSource(ds.id, {
      type: 'geojson',
      data: geojson,
      cluster: ds.geometryType === 'point'
    });

    /* ---------- POINTS ---------- */
    if (ds.geometryType === 'point') {

      map.addLayer({
        id: `${ds.id}-clusters`,
        type: 'circle',
        source: ds.id,
        filter: ['has','point_count'],
        paint: { 'circle-radius': 18, 'circle-color':'#51bbd6' }
      });

      map.addLayer({
        id: `${ds.id}-count`,
        type: 'symbol',
        source: ds.id,
        filter: ['has','point_count'],
        layout: { 'text-field':['get','point_count_abbreviated'] }
      });

      map.addLayer({
        id: `${ds.id}-points`,
        type: 'circle',
        source: ds.id,
        filter: ['!',['has','point_count']],
        paint: {
          'circle-radius':7,
          'circle-color':'#37879d',
          'circle-stroke-width':1,
          'circle-stroke-color':'#fff'
        }
      });
    }

    /* ---------- POLYGONS ---------- */
    if (ds.geometryType === 'polygon') {

      const fillId = `${ds.id}-fill`;

      map.addLayer({
        id: fillId,
        type: 'fill',
        source: ds.id,
        paint: {
          'fill-color': ['interpolate',['linear'],['get','intensity'],
            1,'#fee2e2',
            3,'#f97373',
            5,'#7f1d1d'
          ],
          'fill-opacity':0.5
        }
      });

      map.addLayer({
        id: `${ds.id}-outline`,
        type: 'line',
        source: ds.id,
        paint: { 'line-color':'#111827','line-width':0.5 }
      });

      polygonLayers.push(fillId);
    }
  }

  initTimeline();
});
</script>
</body>
</html>
